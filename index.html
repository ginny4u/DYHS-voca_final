<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14161d">
<title>먹 · 어휘 사자성어 연습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14161d;            /* 먹빛 배경 */
    --ink-2:#1d212c;          /* 카드 뒤 패널 */
    --paper:#f3ede0;          /* 한지 카드 */
    --paper-line:#d9cdb6;     /* 원고지 칸선 */
    --text:#23252c;           /* 종이 위 글자 */
    --muted:#8a8f9c;          /* 어두운 배경 위 보조 */
    --line:#2c313d;           /* 어두운 배경 칸선 */
    --jin:#c0392b;            /* 인주(印朱) 빨강 */
    --jin-soft:#e0876f;
    --ok:#3f9d6d;             /* 정답 초록(은은) */
    --okbg:#e4f0e7;
    --nobg:#f5e2dd;
    --gold:#c9a14a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--ink);
    color:#eee;
    font-family:"Gothic A1",system-ui,sans-serif;
    /* 원고지 칸: 아주 옅은 격자 */
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:30px 30px;
    background-position:center top;
    display:flex; flex-direction:column;
    min-height:100vh; min-height:100dvh;
    overflow-x:hidden;
  }
  .wrap{width:100%;max-width:520px;margin:0 auto;flex:1;display:flex;flex-direction:column;padding:14px 16px calc(16px + env(safe-area-inset-bottom));}

  /* ---------- 상단 ---------- */
  header{text-align:center;padding-top:4px;}
  .seal{
    display:inline-flex;align-items:center;justify-content:center;
    width:38px;height:38px;border-radius:7px;border:2px solid var(--jin);
    color:var(--jin);font-family:"Gowun Batang",serif;font-weight:700;font-size:22px;
    box-shadow:0 0 0 3px rgba(192,57,43,.12);transform:rotate(-3deg);
  }
  h1{font-family:"Gowun Batang",serif;font-weight:700;font-size:18px;margin:8px 0 2px;letter-spacing:.04em;}
  .subtitle{color:var(--muted);font-size:12px;letter-spacing:.06em;margin-bottom:12px;}

  /* 필터칩 */
  .chips{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
  .chip{
    border:1px solid var(--line);background:transparent;color:var(--muted);
    font-family:inherit;font-size:12.5px;font-weight:500;padding:7px 13px;border-radius:999px;
    cursor:pointer;transition:all .15s;
  }
  .chip[aria-pressed="true"]{background:var(--paper);color:var(--ink);border-color:var(--paper);font-weight:700;}
  .chip.jin[aria-pressed="true"]{background:var(--jin);color:#fff;border-color:var(--jin);}

  /* 진행: 원고지 칸 채우기 */
  .progress{display:flex;align-items:center;gap:9px;margin:4px 2px 14px;}
  .grid-bar{flex:1;display:flex;gap:3px;}
  .cell{flex:1;height:9px;border:1px solid var(--line);border-radius:2px;background:transparent;transition:background .25s;}
  .cell.done{background:var(--gold);border-color:var(--gold);}
  .cell.now{border-color:var(--paper);}
  .pcount{font-size:12px;color:var(--muted);min-width:42px;text-align:right;font-variant-numeric:tabular-nums;}
  .stat{display:flex;gap:14px;justify-content:center;margin-bottom:10px;font-size:12px;color:var(--muted);}
  .stat b{color:var(--gold);font-size:14px;}
  .stat .streak b{color:var(--jin-soft);}

  /* ---------- 카드 ---------- */
  .stage{flex:1;display:flex;flex-direction:column;justify-content:flex-start;}
  .card{
    background:var(--paper);color:var(--text);border-radius:16px;
    padding:26px 20px 22px;position:relative;overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
    /* 종이 위 옅은 원고지 칸 */
    background-image:linear-gradient(var(--paper-line) 1px,transparent 1px),linear-gradient(90deg,var(--paper-line) 1px,transparent 1px);
    background-size:26px 26px;
    margin-bottom:14px;
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--jin);opacity:.85;}
  .tag{display:inline-block;font-size:11px;letter-spacing:.1em;color:var(--jin);font-weight:700;margin-bottom:14px;}
  .tag .work{color:#9b8a66;margin-left:7px;font-weight:500;letter-spacing:.04em;}
  .hanja{font-family:"Gowun Batang",serif;font-weight:700;line-height:1.15;letter-spacing:.02em;color:#1a1c22;}
  .hanja.big{font-size:40px;}
  .hanja.word{font-size:34px;}
  .reading{font-family:"Gowun Batang",serif;font-size:18px;color:#6b5f48;margin-top:6px;}
  .ask{margin-top:16px;font-size:13px;color:#8a7f6a;letter-spacing:.04em;}

  /* 보기 버튼 */
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    text-align:left;width:100%;min-height:54px;border-radius:13px;
    border:1.5px solid var(--line);background:var(--ink-2);color:#e8e8ea;
    font-family:inherit;font-size:15px;line-height:1.4;padding:13px 15px;cursor:pointer;
    transition:transform .08s, border-color .15s, background .15s;
    display:flex;align-items:center;gap:11px;
  }
  .opt .key{flex:none;width:22px;height:22px;border-radius:6px;border:1px solid var(--muted);
    display:grid;place-items:center;font-size:12px;color:var(--muted);font-weight:700;}
  .opt:active{transform:scale(.985);}
  .opt:disabled{cursor:default;}
  .opt.correct{background:var(--okbg);border-color:var(--ok);color:#1d3a2a;}
  .opt.correct .key{background:var(--ok);border-color:var(--ok);color:#fff;}
  .opt.wrong{background:var(--nobg);border-color:var(--jin);color:#5b211a;}
  .opt.wrong .key{background:var(--jin);border-color:var(--jin);color:#fff;}
  .opt:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}

  /* 해설 */
  .explain{
    margin-top:14px;background:var(--ink-2);border:1px solid var(--line);border-radius:13px;
    padding:14px 15px;font-size:13.5px;line-height:1.6;color:#cdd1da;display:none;animation:rise .25s ease;
  }
  .explain.show{display:block;}
  .explain .verdict{font-weight:800;font-size:13px;letter-spacing:.04em;margin-bottom:7px;display:flex;align-items:center;gap:7px;}
  .verdict.o{color:var(--ok);} .verdict.x{color:var(--jin-soft);}
  .explain .mean{color:#fff;font-weight:700;}
  .explain .ctx{color:var(--muted);margin-top:6px;display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* 카드 뒤집기(플래시카드) */
  .flip{perspective:1000px;}
  .flip .inner{position:relative;transition:transform .5s;transform-style:preserve-3d;min-height:210px;}
  .flip.turned .inner{transform:rotateY(180deg);}
  .flip .face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;}
  .flip .back{transform:rotateY(180deg);}

  /* 하단 액션 */
  .actions{display:flex;gap:10px;margin-top:auto;}
  .btn{
    flex:1;min-height:54px;border-radius:14px;border:none;font-family:inherit;font-size:16px;font-weight:700;
    cursor:pointer;transition:transform .08s,opacity .15s;letter-spacing:.02em;
  }
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--paper);color:var(--ink);}
  .btn.ghost{background:transparent;color:var(--muted);border:1.5px solid var(--line);}
  .btn.jin{background:var(--jin);color:#fff;}
  .btn:disabled{opacity:.4;cursor:default;}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}

  /* 결과 화면 */
  .result{text-align:center;padding:30px 10px;}
  .result .big{font-family:"Gowun Batang",serif;font-size:54px;color:var(--gold);line-height:1;}
  .result .big small{font-size:22px;color:var(--muted);}
  .result h2{font-family:"Gowun Batang",serif;font-size:20px;margin:14px 0 6px;}
  .result p{color:var(--muted);font-size:14px;margin:0 0 22px;}
  .stamp{
    display:inline-grid;place-items:center;width:88px;height:88px;border-radius:12px;border:3px solid var(--jin);
    color:var(--jin);font-family:"Gowun Batang",serif;font-size:30px;font-weight:700;transform:rotate(-6deg);
    box-shadow:0 0 0 4px rgba(192,57,43,.1);margin-bottom:18px;line-height:1.1;
  }

  .hint{text-align:center;color:var(--muted);font-size:11.5px;margin-top:12px;letter-spacing:.03em;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>
<body>
<div class="wrap">

    <div class="subtitle">어휘와 사자성어, 이동하며 한 손으로</div>
  </header>

  <div class="chips" id="catChips" role="group" aria-label="유형 선택">

  <div class="chips" id="workChips" role="group" aria-label="작품 선택">
    <button class="chip" data-work="전체" aria-pressed="true">전체</button>
    <button class="chip" data-work="만세전" aria-pressed="false">만세전</button>
    <button class="chip" data-work="관상가" aria-pressed="false">관상가</button>
  </div>
  <div class="chips" id="modeChips" role="group" aria-label="모드 선택">
    <button class="chip jin" data-mode="quiz" aria-pressed="true">4지선다</button>
    <button class="chip jin" data-mode="card" aria-pressed="false">플래시카드</button>
  </div>

  <div class="progress">
    <div class="grid-bar" id="gridBar" aria-hidden="true"></div>
    <div class="pcount" id="pCount">0 / 0</div>
  </div>
  <div class="stat">
    <span class="score">맞힘 <b id="sScore">0</b></span>
    <span class="streak">연속 <b id="sStreak">0</b></span>
    <span>최고 연속 <b id="sBest">0</b></span>

  <div class="stage" id="stage"></div>
  <div class="hint" id="hint">표제어를 보고 알맞은 뜻을 고르세요</div>
</div>

  {t:'어휘',w:'관상가',q:'거슬리다',r:'',m:'마음에 어긋나 언짢다',c:'“처음에는 거슬리나 뒤에는 이치에 맞는 것도 있고”'},
  {t:'어휘',w:'관상가',q:'현각자',r:'賢覺者',m:'현명하게 이치를 깨달은 사람',c:'장님이 현각자보다 뛰어나다는 역설'},

  /* ── 공통 어휘 ── */
  {t:'어휘',w:'공통',q:'파리하다',r:'',m:'몸이 마르고 핏기가 없다',c:'두 작품 모두 등장하는 묘사어'},
];

/* ===================== 상태 ===================== */
const S = {cat:'사자성어', work:'전체', mode:'quiz',
  pool:[], i:0, score:0, streak:0, best:0, answered:false, wrong:[], finished:false};

const $ = s => document.querySelector(s);
const stage = $('#stage');

/* 풀(현재 필터)의 항목들 */
function filtered(){
  return DATA.filter(d => d.t===S.cat && (S.work==='전체' || d.w===S.work || d.w==='공통'));
}
/* 같은 카테고리 전체(오답 보기용) */
function categoryAll(){ return DATA.filter(d => d.t===S.cat); }

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function startRound(items){
  S.pool = items ? items : shuffle(filtered());
  S.i=0; S.score=0; S.streak=0; S.best=0; S.wrong=[]; S.answered=false; S.finished=false;
  buildGrid(); updateStat(); render();
}

function buildGrid(){
  const bar=$('#gridBar'); bar.innerHTML='';
  const n=S.pool.length;
  // 칸이 너무 많으면 20칸으로 묶어 비율 표시
  const cells = Math.min(n, 20);
  bar.dataset.cells=cells;
  for(let k=0;k<cells;k++){const c=document.createElement('div');c.className='cell';bar.appendChild(c);}
  paintGrid();
}
function paintGrid(){
  const bar=$('#gridBar'); const cells=+bar.dataset.cells||0; const n=S.pool.length||1;
  const doneRatio = S.i / n;
  const doneCells = Math.round(doneRatio*cells);
  [...bar.children].forEach((c,idx)=>{
    c.className='cell'+(idx<doneCells?' done':'')+(idx===doneCells && !S.finished?' now':'');
  });
  $('#pCount').textContent = Math.min(S.i+ (S.finished?0:0), n) + ' / ' + n;
  if(S.finished) $('#pCount').textContent = n+' / '+n;
}
function updateStat(){
  $('#sScore').textContent=S.score;
  $('#sStreak').textContent=S.streak;
  $('#sBest').textContent=S.best;
}

/* ===================== 렌더 ===================== */
function render(){
  if(S.pool.length===0){
    stage.innerHTML = `<div class="card"><div class="ask">선택한 조건에 해당하는 문제가 없어요. 위 필터를 바꿔 보세요.</div></div>`;
    $('#hint').textContent='';
    return;
  }
  if(S.i>=S.pool.length){ return renderResult(); }
  S.mode==='quiz' ? renderQuiz() : renderCard();
  paintGrid();
}

function headwordHTML(item){
  if(item.t==='사자성어'){
    return `<div class="hanja big">${item.q}</div><div class="reading">${item.r}</div>`;
  }
  const hanja = item.r ? `<div class="reading">${item.r}</div>` : '';
  return `<div class="hanja word">${item.q}</div>${hanja}`;
}

function renderQuiz(){
  const item=S.pool[S.i];
  // 보기: 정답 1 + 같은 카테고리 오답 3
  const others = shuffle(categoryAll().filter(d=>d.m!==item.m)).slice(0,3);
  const opts = shuffle([item, ...others]);
  const KEY=['㉠','㉡','㉢','㉣'];
  $('#hint').textContent = (S.cat==='사자성어'?'사자성어':'어휘')+'의 뜻을 고르세요';
  stage.innerHTML = `
    <div class="card">
      <span class="tag">${item.t}<span class="work">${item.w==='공통'?'만세전·관상가':item.w}</span></span>
      ${headwordHTML(item)}
      <div class="ask">알맞은 뜻은?</div>
    </div>
    <div class="options" id="options">
      ${opts.map((o,k)=>`<button class="opt" data-correct="${o.m===item.m}">
        <span class="key">${KEY[k]}</span><span>${o.m}</span></button>`).join('')}
    </div>
    <div class="explain" id="explain"></div>
    <div class="actions">
      <button class="btn ghost" id="skipBtn">건너뛰기</button>
      <button class="btn primary" id="nextBtn" disabled>다음 ▶</button>
    </div>`;
  S.answered=false;
  document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',onAnswer));
  $('#skipBtn').addEventListener('click',()=>{ if(!S.answered){S.streak=0;updateStat();} next(); });
  $('#nextBtn').addEventListener('click',next);
}

function onAnswer(e){
  if(S.answered) return;
  S.answered=true;
  const item=S.pool[S.i];
  const btns=[...document.querySelectorAll('.opt')];
  const picked=e.currentTarget;
  const correct = picked.dataset.correct==='true';
  btns.forEach(b=>{
    b.disabled=true;
    if(b.dataset.correct==='true') b.classList.add('correct');
  });
  if(correct){
    S.score++; S.streak++; S.best=Math.max(S.best,S.streak);
  }else{
    picked.classList.add('wrong'); S.streak=0; S.wrong.push(item);
  }
  updateStat();
  const ex=$('#explain');
  ex.innerHTML = `
    <div class="verdict ${correct?'o':'x'}">${correct?'● 정답':'● 오답'}</div>
    <span class="mean">${item.t==='사자성어'? item.q+' ('+item.r+')' : item.q}</span> — ${item.m}
    ${item.c?`<span class="ctx">↳ ${item.c}</span>`:''}`;
  ex.classList.add('show');
  $('#nextBtn').disabled=false;
  $('#nextBtn').focus();
}

function renderCard(){
  const item=S.pool[S.i];
  $('#hint').textContent='카드를 눌러 뜻을 확인하세요';
  stage.innerHTML = `
    <div class="card flip" id="flip">
      <div class="inner">
        <div class="face front">
          <span class="tag">${item.t}<span class="work">${item.w==='공통'?'만세전·관상가':item.w}</span></span>
          ${headwordHTML(item)}
          <div class="ask">눌러서 뜻 보기</div>
        </div>
        <div class="face back">
          <span class="tag">뜻</span>
          <div class="hanja" style="font-size:23px;line-height:1.45;">${item.m}</div>
          ${item.c?`<div class="reading" style="font-size:14px;margin-top:12px;color:#7a6d52;line-height:1.5;">↳ ${item.c}</div>`:''}
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost" id="againBtn">다시 볼래요</button>
      <button class="btn primary" id="knowBtn">알아요 ✓</button>
    </div>`;
  const flip=$('#flip');
  flip.addEventListener('click',()=>flip.classList.toggle('turned'));
  $('#knowBtn').addEventListener('click',()=>{ S.score++; S.streak++; S.best=Math.max(S.best,S.streak); updateStat(); next(); });
  $('#againBtn').addEventListener('click',()=>{ S.streak=0; S.wrong.push(item); updateStat(); next(); });
}

function next(){ S.i++; render(); }

function renderResult(){
  S.finished=true; paintGrid();
  const total=S.pool.length, rate=Math.round(S.score/total*100);
  let grade='又日新', word='꾸준함이 실력!';
  if(rate>=90){grade='秀';word='거의 다 잡았어요.';}
  else if(rate>=70){grade='優';word='조금만 더 다지면 완벽!';}
  else if(rate>=50){grade='美';word='틀린 것만 다시 보면 빨라져요.';}
  else {grade='可';word='오답부터 차근차근.';}
  $('#hint').textContent='';
  stage.innerHTML = `
    <div class="result">
      <div class="stamp">${grade}</div>
      <div class="big">${rate}<small>%</small></div>
      <h2>${total}문제 중 ${S.score}개 정답</h2>
      <p>최고 연속 ${S.best}개 · ${word}</p>
      <div class="actions" style="flex-direction:column;">
        ${S.wrong.length?`<button class="btn jin" id="reviewBtn">틀린 ${S.wrong.length}개만 다시 풀기</button>`:''}
        <button class="btn primary" id="retryBtn">처음부터 다시</button>
      </div>
    </div>`;
  if(S.wrong.length) $('#reviewBtn').addEventListener('click',()=>startRound(shuffle(S.wrong)));
  $('#retryBtn').addEventListener('click',()=>startRound());
}

/* ===================== 필터 칩 ===================== */
function bindChips(id, key, after){
  document.querySelectorAll(`#${id} .chip`).forEach(ch=>{
    ch.addEventListener('click',()=>{
      document.querySelectorAll(`#${id} .chip`).forEach(c=>c.setAttribute('aria-pressed','false'));
      ch.setAttribute('aria-pressed','true');
      S[key]=ch.dataset[key];
      after && after();
    });
  });
}
bindChips('catChips','cat',()=>startRound());
bindChips('workChips','work',()=>startRound());
bindChips('modeChips','mode',()=>startRound());

/* 시작 */
startRound();
</script>
